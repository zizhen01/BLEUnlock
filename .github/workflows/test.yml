name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build
      run: |
        xcodebuild clean build \
          -project BLEUnlock.xcodeproj \
          -scheme BLEUnlock \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_ALLOWED=NO

    - name: Archive
      run: |
        xcodebuild archive \
          -project BLEUnlock.xcodeproj \
          -scheme BLEUnlock \
          -archivePath build/Release/BLEUnlock.xcarchive \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_ALLOWED=NO
